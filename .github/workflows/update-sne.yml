name: Update Supernova Data

on:
  schedule:
    - cron: '0 2 * * *'   # 02:00 UTC every day
  workflow_dispatch:        # allow manual trigger from GitHub Actions tab

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests pandas

      - name: Fetch TNS delta
        env:
          TNS_BOT_ID: ${{ secrets.TNS_BOT_ID }}
          TNS_BOT_NAME: ${{ secrets.TNS_BOT_NAME }}
        run: python scripts/fetch_sne.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add supernovae.json
          git diff --staged --quiet || git commit -m "Update supernovae $(date -u +%Y-%m-%d)"
          git push
